services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mortgage_agent
      POSTGRES_USER: mortgage
      POSTGRES_PASSWORD: mortgage_demo
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mortgage -d mortgage_agent']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://mortgage:mortgage_demo@postgres:5432/mortgage_agent
      DEMO_MODE: 'true'
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
